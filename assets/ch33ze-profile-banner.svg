  </defs>
  <rect width="1200" height="360" rx="32" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="32" fill="url(#grid)"/>
  <circle cx="1040" cy="80" r="150" fill="#7c3aed" opacity="0.16" filter="url(#glow)"/>
  <circle cx="150" cy="320" r="190" fill="#4c1d95" opacity="0.24" filter="url(#glow)"/>
  <path d="M70 268 C250 210, 380 320, 560 246 S880 182, 1130 238" fill="none" stroke="url(#line)" stroke-width="3" opacity="0.8"/>

  <text x="76" y="126" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#c4b5fd" letter-spacing="4">PERSONALTECHWIZ</text>
